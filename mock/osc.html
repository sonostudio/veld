<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>oak studio · osc output</title>
<link rel="stylesheet" href="styles.css">
<style>
  .osc-split {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(0, 1.2fr);
    gap: 16px;
    margin-bottom: 16px;
  }
  @media (max-width: 1000px) { .osc-split { grid-template-columns: 1fr; } }

  /* Targets */
  .target-list { display: flex; flex-direction: column; gap: 10px; }
  .target-row {
    background: var(--bg-2);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius);
    padding: 12px 14px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .target-head {
    display: flex; justify-content: space-between; align-items: center; gap: 10px;
  }
  .target-name {
    font-size: 13px; font-weight: 500; color: var(--text-0);
    display: flex; align-items: center; gap: 8px;
  }
  .target-addr {
    font-family: var(--font-mono); font-size: 12px; color: var(--accent);
  }
  .target-meta {
    display: flex; gap: 14px; align-items: center;
    font-size: 11px; color: var(--text-2); font-family: var(--font-mono);
  }
  .target-meta .stat { display: flex; gap: 4px; align-items: center; }
  .target-meta .stat-val { color: var(--text-0); }
  .target-cams {
    display: flex; gap: 4px; flex-wrap: wrap;
    padding-top: 6px;
    border-top: 1px solid var(--border-soft);
  }
  .cam-chip {
    font-size: 11px; padding: 3px 8px; border-radius: var(--radius-sm);
    font-family: var(--font-mono); cursor: pointer;
    background: var(--bg-1); color: var(--text-2);
    border: 1px solid var(--border-soft); line-height: 1.3;
  }
  .cam-chip.on {
    background: var(--accent-bg); color: var(--accent);
    border-color: rgba(93,202,165,0.2);
  }
  .target-row .icon-btn {
    background: transparent; border: none; color: var(--text-2);
    font-size: 14px; padding: 2px 6px; cursor: pointer;
  }
  .target-row .icon-btn:hover { color: var(--text-0); }
  .add-target-btn {
    width: 100%; padding: 10px;
    font-size: 12px; color: var(--text-1);
    border: 1px dashed var(--border); border-radius: var(--radius);
    background: transparent; cursor: pointer; font-family: inherit;
  }
  .add-target-btn:hover { background: var(--bg-2); color: var(--text-0); }

  /* Global settings */
  .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* Monitor */
  .monitor-card { display: flex; flex-direction: column; gap: 10px; }
  .monitor-head {
    display: flex; justify-content: space-between; align-items: center;
    gap: 10px; flex-wrap: wrap;
  }
  .monitor-controls {
    display: flex; gap: 6px; align-items: center;
  }
  .filter-pill {
    font-size: 11px; padding: 4px 9px; border-radius: var(--radius-sm);
    background: var(--bg-2); color: var(--text-1); cursor: pointer;
    border: 1px solid transparent; font-family: var(--font-mono); line-height: 1.3;
  }
  .filter-pill.on {
    background: var(--accent-bg); color: var(--accent);
    border-color: rgba(93,202,165,0.2);
  }
  .filter-pill:hover { color: var(--text-0); }

  .filter-row {
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border-soft);
  }
  .filter-label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--text-2); margin-right: 4px;
  }
  .filter-input {
    background: var(--bg-2); border: 1px solid var(--border-soft);
    border-radius: var(--radius-sm); padding: 4px 9px;
    font-family: var(--font-mono); font-size: 11px;
    color: var(--text-0); flex: 1; min-width: 160px; outline: none;
  }
  .filter-input:focus { border-color: var(--accent-dim); }

  .monitor-log {
    font-family: var(--font-mono); font-size: 11px;
    background: var(--bg-0); border: 1px solid var(--border-soft);
    border-radius: var(--radius); padding: 8px 10px;
    color: var(--text-1); line-height: 1.7;
    height: 420px; overflow-y: auto;
    display: flex; flex-direction: column-reverse;
  }
  .log-row { display: flex; gap: 10px; padding: 1px 0; }
  .log-row .ts { color: var(--text-3); flex-shrink: 0; width: 64px; }
  .log-row .addr { color: var(--accent); flex: 1; min-width: 0; word-break: break-all; }
  .log-row .arrow { color: var(--text-3); flex-shrink: 0; }
  .log-row .val { color: var(--text-0); flex-shrink: 0; }
  .log-row.pose .addr { color: var(--accent); }
  .log-row.depth .addr { color: var(--info); }
  .log-row.object .addr { color: var(--warn); }
  .log-row.motion .addr { color: #F0997B; }
  .log-row.face .addr { color: #ED93B1; }

  .monitor-foot {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 11px; color: var(--text-2); font-family: var(--font-mono);
  }
  .monitor-foot .paused { color: var(--warn); }
  .monitor-foot .live { color: var(--accent); }

  /* Stat tiles row */
  .stat-row {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
    margin-bottom: 16px;
  }
  @media (max-width: 700px) { .stat-row { grid-template-columns: repeat(2, 1fr); } }
</style>
</head>
<body>
<div id="app-root"></div>

<script src="app.js"></script>
<script>
const TARGETS = [
  {
    id: 't1', name: 'TouchDesigner — Studio Mac',
    ip: '192.168.1.100', port: 7000, cameras: [1, 2], active: true, rate: 824
  },
  {
    id: 't2', name: 'Max/MSP — Sound desk',
    ip: '192.168.1.115', port: 9000, cameras: [3], active: true, rate: 312
  },
  {
    id: 't3', name: 'Backup / monitoring',
    ip: '192.168.1.50', port: 7001, cameras: [1, 2, 3, 4], active: false, rate: 0
  },
];

const FILTERS = {
  cameras: new Set([1, 2, 3]),
  models: new Set(['pose', 'depth', 'object', 'motion', 'face']),
  query: '',
  paused: false,
};

// Sample addresses to cycle through for the mock log
const SAMPLE_MESSAGES = [
  { cam: 1, model: 'pose',   addr: '/oak/cam/1/zone/left/pose/0/joint/right_wrist', val: () => `${rand(0,1)} ${rand(0,1)} ${rand(1,3)} ${rand(0.7,1)}` },
  { cam: 1, model: 'pose',   addr: '/oak/cam/1/zone/left/pose/0/joint/left_wrist',  val: () => `${rand(0,1)} ${rand(0,1)} ${rand(1,3)} ${rand(0.7,1)}` },
  { cam: 1, model: 'pose',   addr: '/oak/cam/1/zone/left/pose/0/joint/nose',        val: () => `${rand(0,1)} ${rand(0,1)} ${rand(1,3)} ${rand(0.7,1)}` },
  { cam: 1, model: 'depth',  addr: '/oak/cam/1/zone/center/depth/average',          val: () => `${rand(1,4)}` },
  { cam: 1, model: 'object', addr: '/oak/cam/1/zone/none/object/2/class',           val: () => `bottle` },
  { cam: 1, model: 'object', addr: '/oak/cam/1/zone/none/object/2/position',        val: () => `${rand(0,1)} ${rand(0,1)} ${rand(1,3)}` },
  { cam: 2, model: 'motion', addr: '/oak/cam/2/zone/door/motion/intensity',         val: () => `${rand(0,1)}` },
  { cam: 2, model: 'depth',  addr: '/oak/cam/2/zone/left/depth/average',            val: () => `${rand(1,4)}` },
  { cam: 3, model: 'pose',   addr: '/oak/cam/3/zone/none/pose/1/joint/right_ankle', val: () => `${rand(0,1)} ${rand(0,1)} ${rand(1,3)} ${rand(0.7,1)}` },
  { cam: 3, model: 'face',   addr: '/oak/cam/3/zone/none/face/0/present',           val: () => `1` },
  { cam: 3, model: 'face',   addr: '/oak/cam/3/zone/none/face/0/position',          val: () => `${rand(0,1)} ${rand(0,1)} ${rand(0.1,0.2)} ${rand(0.1,0.2)}` },
];

function rand(min, max) {
  return (min + Math.random() * (max - min)).toFixed(2);
}
function nowTs() {
  const d = new Date();
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
}

function renderTarget(t) {
  const camChips = [1, 2, 3, 4].map(cid => {
    const on = t.cameras.includes(cid);
    return `<span class="cam-chip ${on ? 'on' : ''}" data-target="${t.id}" data-cam="${cid}">cam ${cid}</span>`;
  }).join('');

  return `
    <div class="target-row">
      <div class="target-head">
        <div>
          <div class="target-name">
            <span class="dot ${t.active ? 'ok' : 'off'}"></span>
            ${t.name}
          </div>
          <div class="target-addr">${t.ip}:${t.port}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <button class="toggle ${t.active ? 'on' : ''}" data-target-toggle="${t.id}"></button>
          <button class="icon-btn" title="edit">✎</button>
          <button class="icon-btn" title="delete">×</button>
        </div>
      </div>
      <div class="target-meta">
        <div class="stat">rate <span class="stat-val">${t.active ? t.rate : '—'}/s</span></div>
        <div class="stat">cameras <span class="stat-val">${t.cameras.length}</span></div>
      </div>
      <div class="target-cams">${camChips}</div>
    </div>
  `;
}

function makeLogRow() {
  const msg = SAMPLE_MESSAGES[Math.floor(Math.random() * SAMPLE_MESSAGES.length)];

  // Apply filters
  if (!FILTERS.cameras.has(msg.cam)) return null;
  if (!FILTERS.models.has(msg.model)) return null;
  if (FILTERS.query && !msg.addr.toLowerCase().includes(FILTERS.query.toLowerCase())) return null;

  return `
    <div class="log-row ${msg.model}">
      <span class="ts">${nowTs()}</span>
      <span class="addr">${msg.addr}</span>
      <span class="arrow">→</span>
      <span class="val">${msg.val()}</span>
    </div>
  `;
}

function tickLog() {
  if (FILTERS.paused) return;
  const log = document.getElementById('osc-log');
  if (!log) return;

  // Add 3-5 new messages per tick
  const count = 3 + Math.floor(Math.random() * 3);
  for (let i = 0; i < count; i++) {
    const row = makeLogRow();
    if (row) {
      const div = document.createElement('div');
      div.innerHTML = row;
      log.insertBefore(div.firstElementChild, log.firstChild);
    }
  }

  // Cap at 200 rows
  while (log.children.length > 200) {
    log.removeChild(log.lastChild);
  }
}

function renderPage() {
  const totalRate = TARGETS.filter(t => t.active).reduce((s, t) => s + t.rate, 0);
  const activeCount = TARGETS.filter(t => t.active).length;

  const mainHTML = `
    <div class="page-head">
      <div>
        <h1 class="page-title">OSC output</h1>
        <p class="page-sub">Configure destinations and monitor outgoing messages</p>
      </div>
      <div style="display:flex;gap:8px">
        <button>Test connection</button>
        <button class="primary">Apply changes</button>
      </div>
    </div>

    <div class="stat-row">
      <div class="metric">
        <div class="metric-label">Targets active</div>
        <div class="metric-value">${activeCount} / ${TARGETS.length}</div>
      </div>
      <div class="metric">
        <div class="metric-label">Total rate</div>
        <div class="metric-value">↑ ${totalRate.toLocaleString()}<span style="font-size:11px;color:var(--text-2);margin-left:4px">/s</span></div>
      </div>
      <div class="metric">
        <div class="metric-label">Address prefix</div>
        <div class="metric-value" style="font-size:16px">/oak</div>
      </div>
      <div class="metric">
        <div class="metric-label">Send FPS</div>
        <div class="metric-value">30</div>
      </div>
    </div>

    <div class="osc-split">

      <div>
        <div class="section-head" style="margin-top:0">
          <h2>Targets</h2>
          <span class="section-sub">${TARGETS.length} configured</span>
        </div>
        <div class="card">
          <div class="target-list" id="target-list">
            ${TARGETS.map(renderTarget).join('')}
          </div>
          <button class="add-target-btn" style="margin-top:12px">+ Add target</button>
        </div>

        <div class="section-head">
          <h2>Global settings</h2>
        </div>
        <div class="card">
          <div class="field-row">
            <span class="field-label">Address prefix</span>
            <div class="field-control">
              <input type="text" value="/oak" style="width:120px;text-align:right">
            </div>
          </div>
          <div class="field-row">
            <span class="field-label">Send FPS</span>
            <div class="field-control">
              <input type="range" min="10" max="30" value="30">
              <span class="field-val">30</span>
            </div>
          </div>
          <div class="field-row">
            <span class="field-label">Drop detections outside zones</span>
            <div class="field-control"><button class="toggle"></button></div>
          </div>
          <div class="field-row">
            <span class="field-label">Include confidence values</span>
            <div class="field-control"><button class="toggle on"></button></div>
          </div>
          <div class="field-row">
            <span class="field-label">Coordinate origin</span>
            <div class="field-control">
              <div style="display:flex;gap:4px">
                <span class="filter-pill on">top-left</span>
                <span class="filter-pill">center</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div>
        <div class="section-head" style="margin-top:0">
          <h2>Live monitor</h2>
          <span class="section-sub" id="monitor-status">
            <span class="live">● streaming</span>
          </span>
        </div>
        <div class="card monitor-card">
          <div class="filter-row">
            <span class="filter-label">cam</span>
            <span class="filter-pill on" data-filter="cam" data-val="1">1</span>
            <span class="filter-pill on" data-filter="cam" data-val="2">2</span>
            <span class="filter-pill on" data-filter="cam" data-val="3">3</span>
            <span class="filter-pill" data-filter="cam" data-val="4">4</span>
          </div>
          <div class="filter-row">
            <span class="filter-label">model</span>
            <span class="filter-pill on" data-filter="model" data-val="pose">pose</span>
            <span class="filter-pill on" data-filter="model" data-val="depth">depth</span>
            <span class="filter-pill on" data-filter="model" data-val="object">object</span>
            <span class="filter-pill on" data-filter="model" data-val="motion">motion</span>
            <span class="filter-pill on" data-filter="model" data-val="face">face</span>
          </div>
          <div class="filter-row" style="border-bottom:none;padding-bottom:0">
            <span class="filter-label">match</span>
            <input class="filter-input" id="filter-query" placeholder="filter by address — e.g. zone/left or /pose/0">
            <button class="filter-pill" id="pause-btn">⏸ pause</button>
            <button class="filter-pill" id="clear-btn">clear</button>
          </div>
          <div class="monitor-log" id="osc-log"></div>
          <div class="monitor-foot">
            <span id="log-stats">— msgs shown · filtering 3 cameras, 5 models</span>
            <span>scroll up = older messages</span>
          </div>
        </div>
      </div>

    </div>
  `;

  mount('osc', mainHTML);
  attachHandlers();
}

function attachHandlers() {
  // Target enable/disable toggle
  document.querySelectorAll('[data-target-toggle]').forEach(t => {
    t.onclick = (e) => {
      e.stopPropagation();
      const id = t.dataset.targetToggle;
      const target = TARGETS.find(x => x.id === id);
      target.active = !target.active;
      if (!target.active) target.rate = 0;
      else target.rate = 400 + Math.floor(Math.random() * 500);
      renderPage();
    };
  });

  // Cam chip toggle per target
  document.querySelectorAll('.cam-chip[data-target]').forEach(chip => {
    chip.onclick = () => {
      const tId = chip.dataset.target;
      const cId = parseInt(chip.dataset.cam, 10);
      const target = TARGETS.find(x => x.id === tId);
      if (target.cameras.includes(cId)) {
        target.cameras = target.cameras.filter(c => c !== cId);
      } else {
        target.cameras.push(cId);
        target.cameras.sort();
      }
      renderPage();
    };
  });

  // Filter pills
  document.querySelectorAll('.filter-pill[data-filter]').forEach(pill => {
    pill.onclick = () => {
      const filter = pill.dataset.filter;
      const val = pill.dataset.val;
      pill.classList.toggle('on');

      const set = filter === 'cam' ? FILTERS.cameras : FILTERS.models;
      const v = filter === 'cam' ? parseInt(val, 10) : val;

      if (set.has(v)) set.delete(v);
      else set.add(v);

      updateLogStats();
    };
  });

  // Search query
  const queryInput = document.getElementById('filter-query');
  if (queryInput) {
    queryInput.oninput = () => { FILTERS.query = queryInput.value; };
  }

  // Pause / clear
  const pauseBtn = document.getElementById('pause-btn');
  if (pauseBtn) {
    pauseBtn.onclick = () => {
      FILTERS.paused = !FILTERS.paused;
      pauseBtn.classList.toggle('on');
      pauseBtn.textContent = FILTERS.paused ? '▶ resume' : '⏸ pause';
      const status = document.getElementById('monitor-status');
      if (status) {
        status.innerHTML = FILTERS.paused
          ? '<span class="paused">⏸ paused</span>'
          : '<span class="live">● streaming</span>';
      }
    };
  }
  const clearBtn = document.getElementById('clear-btn');
  if (clearBtn) {
    clearBtn.onclick = () => {
      const log = document.getElementById('osc-log');
      if (log) log.innerHTML = '';
    };
  }

  // Global toggles
  document.querySelectorAll('.toggle:not([data-target-toggle])').forEach(t => {
    t.onclick = () => t.classList.toggle('on');
  });

  // Settings filter-pill toggles
  document.querySelectorAll('.field-control .filter-pill').forEach(p => {
    p.onclick = () => {
      p.parentElement.querySelectorAll('.filter-pill').forEach(s => s.classList.remove('on'));
      p.classList.add('on');
    };
  });

  // Pre-seed log with some lines so it doesn't start empty
  setTimeout(() => {
    for (let i = 0; i < 20; i++) tickLog();
    updateLogStats();
  }, 50);

  // Stream
  setInterval(tickLog, 400);
  setInterval(updateLogStats, 1000);
}

function updateLogStats() {
  const log = document.getElementById('osc-log');
  const stats = document.getElementById('log-stats');
  if (!log || !stats) return;
  stats.textContent = `${log.children.length} msgs shown · filtering ${FILTERS.cameras.size} cameras, ${FILTERS.models.size} models`;
}

renderPage();
</script>
</body>
</html>
