<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>oak studio · cameras</title>
<link rel="stylesheet" href="styles.css">
<style>
  .split { display: grid; grid-template-columns: 1fr 280px; gap: 16px; margin-bottom: 16px; }

  .preview-card { display: flex; flex-direction: column; gap: 10px; }
  .preview-head {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 11px; color: var(--text-1); font-family: var(--font-mono);
  }
  .live-indicator { display: inline-flex; align-items: center; gap: 6px; color: var(--accent); }
  .live-indicator::before {
    content: ""; width: 5px; height: 5px; border-radius: 50%;
    background: var(--accent); animation: pulse 1.4s infinite;
  }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  .preview-frame {
    aspect-ratio: 16 / 10; background: #0a0a0b;
    border-radius: var(--radius); position: relative; overflow: hidden;
    border: 1px solid var(--border-soft);
  }
  .preview-overlay { position: absolute; inset: 0; }
  .preview-empty {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 6px; color: var(--text-2); font-size: 11px;
  }

  .preview-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
  .preview-stats .metric { padding: 8px 10px; }
  .preview-stats .metric-label { font-size: 9px; margin-bottom: 4px; }
  .preview-stats .metric-value { font-size: 14px; }
  .preview-stats .metric-sub { font-size: 10px; }

  .detail-row {
    display: grid;
    grid-template-columns: minmax(0, 1.2fr) minmax(0, 1fr);
    gap: 16px;
    margin-top: 16px;
  }
  @media (max-width: 1000px) {
    .detail-row { grid-template-columns: 1fr; }
  }

  .model-list { display: flex; flex-direction: column; gap: 1px; max-height: 360px; overflow-y: auto; }
  .model-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 10px; border-radius: var(--radius-sm);
    font-size: 12px; cursor: pointer; line-height: 1.3;
  }
  .model-item:hover { background: var(--bg-2); }
  .model-item.selected { background: var(--bg-3); }
  .model-left { display: flex; align-items: center; gap: 8px; min-width: 0; }
  .model-name { color: var(--text-0); }
  .model-name.dim { color: var(--text-2); }
  .model-meta { font-size: 10px; color: var(--text-3); font-family: var(--font-mono); }
  .runtime-tag {
    font-size: 9px; padding: 1px 5px; border-radius: 3px;
    background: var(--bg-3); color: var(--text-2); font-family: var(--font-mono);
    letter-spacing: 0.05em;
  }
  .runtime-tag.pi { background: rgba(127,119,221,0.15); color: var(--info); }

  .chip-group { display: flex; gap: 4px; flex-wrap: wrap; justify-content: flex-end; }
  .chip {
    font-size: 11px; padding: 4px 9px; border-radius: var(--radius-sm);
    background: var(--bg-2); color: var(--text-1); cursor: pointer;
    border: 1px solid transparent; line-height: 1; font-family: var(--font-mono);
  }
  .chip.on { background: var(--accent-bg); color: var(--accent); }
  .chip:hover { color: var(--text-0); }

  .zone-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
  .zone-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 10px; background: var(--bg-2); border-radius: var(--radius-sm);
    font-size: 12px; gap: 8px;
  }
  .zone-name { display: flex; align-items: center; gap: 8px; }
  .zone-color { width: 10px; height: 10px; border-radius: 2px; }
  .zone-mono { font-family: var(--font-mono); color: var(--text-2); font-size: 11px; }
  .add-zone-btn {
    margin-top: 10px; width: 100%; padding: 9px;
    font-size: 12px; color: var(--text-1);
    border: 1px dashed var(--border); border-radius: var(--radius);
    background: transparent; cursor: pointer; font-family: inherit;
  }
  .add-zone-btn:hover { background: var(--bg-2); color: var(--text-0); }

  .issue-banner {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; background: var(--warn-bg);
    border: 1px solid rgba(239,159,39,0.25); border-radius: var(--radius);
    color: var(--warn); font-size: 12px; margin-bottom: 16px;
  }
</style>
</head>
<body>
<div id="app-root"></div>

<script src="app.js"></script>
<script>
const PAGE = { activeCamId: 1, selectedModel: 'pose' };

function getActiveCam() { return MOCK.cameras.find(c => c.id === PAGE.activeCamId); }

function renderPreviewSVG(cam) {
  if (cam.status === 'offline') {
    return `
      <div class="preview-empty">
        <div style="font-size:24px;font-family:var(--font-mono)">—</div>
        <div>Camera offline</div>
      </div>`;
  }

  const activeModelIds = MOCK.models
    .filter(m => m.enabled_on.includes(cam.id))
    .map(m => m.id);

  if (activeModelIds.length === 0) {
    return `
      <div class="preview-empty">
        <div style="font-size:24px;font-family:var(--font-mono)">live</div>
        <div>No models active — raw feed only</div>
      </div>`;
  }

  let overlays = '';
  if (activeModelIds.includes('pose')) {
    overlays += `
      <g stroke="#5DCAA5" stroke-width="1.3" fill="none">
        <circle cx="155" cy="80" r="9" fill="#5DCAA5" fill-opacity="0.2"/>
        <line x1="155" y1="89" x2="155" y2="140"/>
        <line x1="155" y1="100" x2="130" y2="130"/>
        <line x1="155" y1="100" x2="180" y2="125"/>
        <line x1="155" y1="140" x2="140" y2="190"/>
        <line x1="155" y1="140" x2="170" y2="190"/>
      </g>
      <g fill="#5DCAA5"><circle cx="130" cy="130" r="2"/><circle cx="180" cy="125" r="2"/><circle cx="140" cy="190" r="2"/><circle cx="170" cy="190" r="2"/></g>
      <text x="120" y="74" fill="#9FE1CB" font-size="5" font-family="monospace">person 0  conf 0.92</text>
      <g stroke="#7F77DD" stroke-width="1.3" fill="none">
        <circle cx="280" cy="110" r="8" fill="#7F77DD" fill-opacity="0.2"/>
        <line x1="280" y1="118" x2="280" y2="160"/>
        <line x1="280" y1="125" x2="262" y2="148"/>
        <line x1="280" y1="125" x2="298" y2="145"/>
        <line x1="280" y1="160" x2="268" y2="195"/>
        <line x1="280" y1="160" x2="292" y2="195"/>
      </g>
      <text x="246" y="104" fill="#CECBF6" font-size="5" font-family="monospace">person 1  conf 0.87</text>
    `;
  }
  if (activeModelIds.includes('object')) {
    overlays += `
      <rect x="312" y="170" width="38" height="28" stroke="#EF9F27" stroke-width="0.8" fill="#EF9F27" fill-opacity="0.08" stroke-dasharray="3 2"/>
      <text x="312" y="166" fill="#EF9F27" font-size="5" font-family="monospace">chair · 0.79</text>
    `;
  }
  if (activeModelIds.includes('depth')) {
    overlays += `
      <rect x="40" y="40" width="120" height="170" fill="#1D9E75" fill-opacity="0.06" stroke="#1D9E75" stroke-width="0.6" stroke-dasharray="4 3"/>
      <text x="46" y="52" fill="#5DCAA5" font-size="6" font-family="monospace">left  1.82m</text>
      <rect x="240" y="40" width="120" height="170" fill="#534AB7" fill-opacity="0.06" stroke="#534AB7" stroke-width="0.6" stroke-dasharray="4 3"/>
      <text x="246" y="52" fill="#AFA9EC" font-size="6" font-family="monospace">right  2.41m</text>
    `;
  }
  if (activeModelIds.includes('motion')) {
    overlays += `
      <rect x="40" y="40" width="320" height="170" fill="none" stroke="#EF9F27" stroke-width="0.5" stroke-dasharray="2 2" opacity="0.5"/>
      <text x="46" y="52" fill="#EF9F27" font-size="6" font-family="monospace">motion 0.42</text>
    `;
  }
  if (activeModelIds.includes('hand')) {
    overlays += `
      <g stroke="#F0997B" stroke-width="1" fill="none">
        <circle cx="180" cy="125" r="3" fill="#F0997B"/>
        <line x1="180" y1="125" x2="190" y2="115"/>
        <line x1="180" y1="125" x2="195" y2="120"/>
        <line x1="180" y1="125" x2="195" y2="125"/>
        <line x1="180" y1="125" x2="195" y2="130"/>
        <line x1="180" y1="125" x2="190" y2="135"/>
      </g>
    `;
  }

  return `
    <svg class="preview-overlay" viewBox="0 0 400 250" preserveAspectRatio="xMidYMid slice">
      <rect width="400" height="250" fill="#0e0e10"/>
      <g opacity="0.25">
        <line x1="0" y1="62" x2="400" y2="62" stroke="#444" stroke-width="0.5"/>
        <line x1="0" y1="125" x2="400" y2="125" stroke="#444" stroke-width="0.5"/>
        <line x1="0" y1="188" x2="400" y2="188" stroke="#444" stroke-width="0.5"/>
        <line x1="100" y1="0" x2="100" y2="250" stroke="#444" stroke-width="0.5"/>
        <line x1="200" y1="0" x2="200" y2="250" stroke="#444" stroke-width="0.5"/>
        <line x1="300" y1="0" x2="300" y2="250" stroke="#444" stroke-width="0.5"/>
      </g>
      ${overlays}
      <g fill="#fff" opacity="0.7" font-family="monospace" font-size="5">
        <text x="8" y="242" data-tick-svg="fps-svg" data-cam-id="${cam.id}">${cam.fps} fps · ${cam.latency} ms</text>
        <text x="343" y="242">cam ${cam.id}</text>
      </g>
    </svg>
  `;
}

function renderModelList() {
  const cam = getActiveCam();
  return MOCK.models.map(m => {
    const isOn = m.enabled_on.includes(cam.id);
    const isSel = PAGE.selectedModel === m.id;
    return `
      <div class="model-item ${isSel ? 'selected' : ''}" data-model-id="${m.id}">
        <div class="model-left">
          <span class="dot ${isOn ? 'ok' : 'off'}"></span>
          <span class="model-name ${isOn ? '' : 'dim'}">${m.name}</span>
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          <span class="runtime-tag ${m.runtime === 'Pi' ? 'pi' : ''}">${m.runtime}</span>
          <span class="model-meta">${isOn ? jitter(28, 3) : '—'}</span>
        </div>
      </div>
    `;
  }).join('');
}

function renderModelDetail() {
  const cam = getActiveCam();
  const model = MOCK.models.find(m => m.id === PAGE.selectedModel);
  if (!model) return '';
  const isOn = model.enabled_on.includes(cam.id);

  const fieldsByModel = {
    pose: [
      ['Max people',          'range', 1, 5, 5, ''],
      ['Confidence threshold','range', 0, 100, 55, '0.55'],
      ['Output Z (depth)',    'toggle', true],
      ['Send only when present', 'toggle', false],
      ['Joints to send',      'chips', ['all 17', 'arms only', 'hands only', 'custom'], 0],
    ],
    depth: [
      ['Min range (m)',       'range', 0, 100, 35, '0.35'],
      ['Max range (m)',       'range', 0, 100, 80, '8.00'],
      ['Output raw map',      'toggle', false],
      ['Output zone average', 'toggle', true],
    ],
    object: [
      ['Confidence threshold','range', 0, 100, 60, '0.60'],
      ['Max objects',         'range', 1, 20, 10, ''],
      ['Track across frames', 'toggle', true],
      ['Output velocity',     'toggle', true],
      ['Model',               'chips', ['COCO 80-class', 'custom: red_ball_v3'], 0],
    ],
    motion: [
      ['Sensitivity',         'range', 0, 100, 40, '0.40'],
      ['Min motion duration (ms)', 'range', 0, 1000, 200, '200'],
      ['Output intensity',    'toggle', true],
      ['Trigger on entry only', 'toggle', false],
    ],
    blob: [
      ['Min blob area',       'range', 0, 100, 5, '0.05'],
      ['Max blob area',       'range', 0, 100, 50, '0.50'],
      ['Track across frames', 'toggle', true],
    ],
    hand: [
      ['Max hands',           'range', 1, 2, 2, ''],
      ['Confidence threshold','range', 0, 100, 50, '0.50'],
      ['Output all 21 points', 'toggle', true],
    ],
    face: [
      ['Confidence threshold','range', 0, 100, 65, '0.65'],
      ['Max faces',           'range', 1, 10, 5, ''],
    ],
    flandmarks: [
      ['Confidence threshold','range', 0, 100, 55, '0.55'],
      ['Output mouth open',   'toggle', true],
      ['Output eye open',     'toggle', true],
    ],
    gaze: [
      ['Confidence threshold','range', 0, 100, 50, '0.50'],
      ['Output target point', 'toggle', true],
    ],
    count: [
      ['Source',              'chips', ['from pose', 'from face'], 0],
      ['Update interval (ms)','range', 100, 2000, 500, '500'],
    ],
    flow: [
      ['Grid resolution',     'chips', ['8×8', '16×16', '32×32'], 1],
      ['Output dominant only', 'toggle', false],
    ],
    gesture: [
      ['Vocabulary',          'chips', ['default 6', 'custom set'], 0],
      ['Hold duration (ms)',  'range', 100, 2000, 600, '600'],
    ],
    bgsub: [
      ['Sensitivity',         'range', 0, 100, 50, '0.50'],
      ['Output silhouette',   'toggle', true],
    ],
    color: [
      ['Target colors',       'chips', ['red', 'green', 'blue', 'custom'], 0],
      ['Hue tolerance',       'range', 0, 60, 15, '15°'],
    ],
  };

  const fields = fieldsByModel[model.id] || [];
  const fieldsHTML = fields.map(f => {
    if (f[1] === 'range') {
      return `
        <div class="field-row">
          <span class="field-label">${f[0]}</span>
          <div class="field-control">
            <input type="range" min="${f[2]}" max="${f[3]}" value="${f[4]}">
            <span class="field-val">${f[5] || f[4]}</span>
          </div>
        </div>`;
    } else if (f[1] === 'toggle') {
      return `
        <div class="field-row">
          <span class="field-label">${f[0]}</span>
          <div class="field-control"><button class="toggle ${f[2] ? 'on' : ''}"></button></div>
        </div>`;
    } else if (f[1] === 'chips') {
      const chips = f[2].map((c, i) =>
        `<span class="chip ${i === f[3] ? 'on' : ''}">${c}</span>`
      ).join('');
      return `
        <div class="field-row">
          <span class="field-label">${f[0]}</span>
          <div class="field-control"><div class="chip-group">${chips}</div></div>
        </div>`;
    }
  }).join('');

  return `
    <div class="card">
      <div class="card-head">
        <div>
          <h3 class="card-title">${model.name}</h3>
          <p class="card-sub">Runs on ${model.runtime === 'Pi' ? 'Raspberry Pi inference' : 'OAK-D onboard VPU'}. ${model.tier === 'pro' ? 'Studio Pro only.' : 'Available on all tiers.'}</p>
        </div>
        <button class="toggle ${isOn ? 'on' : ''}" id="model-toggle"></button>
      </div>
      ${fieldsHTML}
    </div>
  `;
}

function renderZoneSection() {
  return `
    <div class="card">
      <div class="card-head" style="margin-bottom:0">
        <div>
          <h3 class="card-title">Zones</h3>
          <p class="card-sub">Regions of interest. Detections inside a zone include the zone name in their OSC address.</p>
        </div>
        <button>Edit on preview</button>
      </div>
      <div class="zone-grid">
        <div class="zone-row">
          <div class="zone-name"><span class="zone-color" style="background:#1D9E75"></span>left</div>
          <span class="zone-mono">x:0.10  y:0.16</span>
        </div>
        <div class="zone-row">
          <div class="zone-name"><span class="zone-color" style="background:#534AB7"></span>right</div>
          <span class="zone-mono">x:0.60  y:0.16</span>
        </div>
      </div>
      <button class="add-zone-btn">+ Add zone</button>
    </div>
  `;
}

function renderPage() {
  const cam = getActiveCam();
  const camTabs = MOCK.cameras.map(c =>
    `<button class="cam-tab ${c.id === PAGE.activeCamId ? 'active' : ''} ${c.issue ? 'has-issue' : ''}" data-cam-id="${c.id}">cam ${c.id}</button>`
  ).join('');

  const issueBanner = cam.issue ? `
    <div class="issue-banner">
      <span>⚠</span>
      <span>${cam.issue}</span>
    </div>
  ` : '';

  const mainHTML = `
    <div class="page-head">
      <div>
        <h1 class="page-title">Cameras</h1>
        <p class="page-sub">Configure detection models, zones, and thresholds per camera</p>
      </div>
      <div class="cam-tabs" id="cam-tabs">${camTabs}</div>
    </div>

    ${issueBanner}

    <div class="split">
      <div class="card preview-card">
        <div class="preview-head">
          <span class="live-indicator">live · cam ${cam.id}</span>
          <span>${cam.status === 'online' ? '1280 × 720 · ' + cam.model : 'offline'}</span>
        </div>
        <div class="preview-frame">${renderPreviewSVG(cam)}</div>
        <div class="preview-stats">
          <div class="metric">
            <div class="metric-label">Active models</div>
            <div class="metric-value">${MOCK.models.filter(m => m.enabled_on.includes(cam.id)).length}</div>
          </div>
          <div class="metric">
            <div class="metric-label">FPS</div>
            <div class="metric-value" data-tick="fps" data-cam-id="${cam.id}">${cam.fps}</div>
          </div>
          <div class="metric">
            <div class="metric-label">Latency</div>
            <div class="metric-value" data-tick="latency" data-cam-id="${cam.id}">${cam.latency}ms</div>
          </div>
          <div class="metric">
            <div class="metric-label">OSC rate</div>
            <div class="metric-value">↑ <span data-tick="osc-rate">${MOCK.osc.messages_per_sec}</span>/s</div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="section-label">Detection models</div>
        <div class="model-list" id="model-list">${renderModelList()}</div>
      </div>
    </div>

    <div class="detail-row">
      <div id="model-detail">${renderModelDetail()}</div>
      <div>${renderZoneSection()}</div>
    </div>

    <div class="bottom-bar">
      <span class="saved">✓ saved · 2s ago</span>
      <div class="actions">
        <button>Reset</button>
        <button>Apply to all cameras</button>
        <button class="primary">Restart pipeline</button>
      </div>
    </div>
  `;

  mount('cameras', mainHTML);
  attachHandlers();
  startTickers();
}

function attachHandlers() {
  document.querySelectorAll('#cam-tabs .cam-tab').forEach(t => {
    t.addEventListener('click', () => {
      PAGE.activeCamId = parseInt(t.dataset.camId, 10);
      renderPage();
    });
  });
  document.querySelectorAll('#model-list .model-item').forEach(item => {
    item.addEventListener('click', () => {
      PAGE.selectedModel = item.dataset.modelId;
      document.querySelectorAll('#model-list .model-item').forEach(i => i.classList.remove('selected'));
      item.classList.add('selected');
      document.getElementById('model-detail').innerHTML = renderModelDetail();
      bindLocalToggles();
    });
  });
  bindLocalToggles();
}

function bindLocalToggles() {
  document.querySelectorAll('.toggle').forEach(t => {
    t.onclick = () => {
      t.classList.toggle('on');
      if (t.id === 'model-toggle') {
        const cam = getActiveCam();
        const model = MOCK.models.find(m => m.id === PAGE.selectedModel);
        if (t.classList.contains('on') && !model.enabled_on.includes(cam.id)) {
          model.enabled_on.push(cam.id);
        } else if (!t.classList.contains('on')) {
          model.enabled_on = model.enabled_on.filter(id => id !== cam.id);
        }
        document.getElementById('model-list').innerHTML = renderModelList();
        document.querySelectorAll('#model-list .model-item').forEach(item => {
          item.addEventListener('click', () => {
            PAGE.selectedModel = item.dataset.modelId;
            renderPage();
          });
        });
      }
    };
  });
  document.querySelectorAll('.chip').forEach(c => {
    c.addEventListener('click', () => {
      c.parentElement.querySelectorAll('.chip').forEach(s => s.classList.remove('on'));
      c.classList.add('on');
    });
  });
}

renderPage();
</script>
</body>
</html>
